name: CI Makefile

on:
  push:
    branches: '**'
  pull_request:
    branches: '**'

jobs:
  Ubuntu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        perl-version:
          - '5.14'
          - '5.24'
          - '5.34'
          - 'latest'
    container:
      image: perldocker/perl-tester:${{ matrix.perl-version }}     # https://hub.docker.com/r/perldocker/perl-tester
    name: Perl ${{ matrix.perl-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: perl -V
        run: perl -V
      - name: Cache CPAN dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cpanm
          key: ${{ runner.os }}-cpan-${{ hashFiles('**/Makefile.PL', '**/cpanfile') }}
          restore-keys: |
            ${{ runner.os }}-cpan-
      - name: Install ExtUtils::MakeMaker
        run: cpanm --notest ExtUtils::MakeMaker@7.12
      - name: Install Dependencies
        run: cpanm --notest --installdeps .
      - name: perl Makefile.PL
        run: perl Makefile.PL
      - name: make
        run: make
      - name: Regular tests
        run: make test

  Windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: perl -V
        run: perl -V
      - name: Cache CPAN dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cpanm
          key: ${{ runner.os }}-cpan-${{ hashFiles('**/Makefile.PL', '**/cpanfile') }}
          restore-keys: |
            ${{ runner.os }}-cpan-
      - name: Install ExtUtils::MakeMaker
        run: cpanm --notest ExtUtils::MakeMaker@7.12
      - name: Install Dependencies
        run: cpanm --notest --installdeps .
      - name: perl Makefile.PL
        run: perl Makefile.PL
      - name: make
        run: make
      - name: Run Tests
        run: make test
